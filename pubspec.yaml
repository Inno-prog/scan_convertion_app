name: file_converter
description: "Convert any file to any format"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  dio: ^5.7.0
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  dotted_border: ^2.1.0
  lottie: ^3.1.3
  shared_preferences: ^2.3.2
  share_plus: ^10.0.2
  intl: ^0.19.0
  ffmpeg_kit_flutter_new: ^4.1.0
  image: ^4.3.0
  pdf: ^3.11.3
  syncfusion_flutter_pdf: ^29.1.38
  flutter_local_notifications: ^19.5.0
  image_picker: ^1.1.2
  camera: ^0.11.1
  mobile_scanner: ^5.2.3
  google_mlkit_text_recognition: ^0.11.0
  flutter_image_compress: ^2.4.0
  url_launcher: ^6.3.1
  image_cropper: ^9.1.0
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
